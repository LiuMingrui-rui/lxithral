<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lxithral</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">Lxithral</a>
      <nav class="nav">
        <a href="index.html">Writing</a>
        <a href="about.html">About</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <span class="sun">☀️</span>
          <span class="moon">🌙</span>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1 class="scroll-reveal">Lxithral Journal</h1>
        <p class="scroll-reveal" style="animation-delay: 0.2s;">在你的叙事中寻找连贯的碎片，于数字废墟之上重建意义的花园。</p>
      </div>
    </section>

    <section class="posts">
      <div class="container">
        <h2 class="scroll-reveal">Latest Writing</h2>
        <div class="post-list">
          <a href="posts/post-1.html" class="post-item scroll-reveal from-left">
            <div class="post-meta">2025.03.14 · 叙事</div>
            <h3>非线性叙事的碎片</h3>
            <p>当我们打碎时间的线性叙事，碎片中映照出的不再是故事的缺失，而是记忆本身的纹理。</p>
          </a>
          <a href="posts/post-2.html" class="post-item scroll-reveal from-right" style="animation-delay: 0.2s;">
            <div class="post-meta">2025.04.02 · 数字</div>
            <h3>数字废墟漫步</h3>
            <p>在那些被遗忘的服务器与废弃的像素之间，有一种新的考古学正在等待被发明。</p>
          </a>
        </div>
      </div>
    </section>

    <section class="about-preview">
      <div class="container">
        <h2 class="scroll-reveal">About</h2>
        <p class="scroll-reveal" style="animation-delay: 0.2s;">在碎片中构建连贯</p>
        <a href="about.html" class="btn scroll-reveal scale-in" style="animation-delay: 0.3s;">了解更多</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 Lxithral</p>
      <p>All fragments converge</p>
    </div>
  </footer>

  <script>
    // 主题切换功能
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    
    // 检测系统主题偏好
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    // 加载保存的主题设置
    const savedTheme = localStorage.getItem('theme');
    
    // 初始化主题
    if (savedTheme) {
      html.classList.add(savedTheme);
    } else if (systemPrefersDark) {
      html.classList.add('dark-mode');
    }
    
    // 主题切换按钮点击事件
    themeToggle.addEventListener('click', () => {
      if (html.classList.contains('dark-mode')) {
        html.classList.remove('dark-mode');
        html.classList.add('light-mode');
        localStorage.setItem('theme', 'light-mode');
      } else {
        html.classList.remove('light-mode');
        html.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark-mode');
      }
    });

    // 滚动显示效果
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
