<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - 我的博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cursor-glow" id="cursorGlow"></div>

<nav class="nav">
    <a href="index.html" class="nav-logo">我的博客</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="about.html">关于</a></li>
    </ul>
</nav>

<main class="main">

    <section class="about-header">
        <div class="hero-label">About</div>
        <h1>关于我</h1>
        <p class="subtitle">写代码的，偶尔写点文字。</p>
    </section>

    <div class="about-content">

        <p>
            你好，欢迎来到我的博客。这里是我的个人空间，用来记录技术学习的笔记、项目经验，以及生活中的一些思考。
        </p>

        <p>
            我相信好的内容不需要花哨的包装，所以这个博客只用了最基础的 HTML 和 CSS。简单，但够用。
        </p>

        <h2>技术栈</h2>
        <p>
            日常使用的技术包括但不限于：JavaScript、TypeScript、Python、Go。前端后端都写一点，不算精通，但都能上手。
        </p>

        <h2>联系我</h2>
        <p>如果你有什么想法或者建议，欢迎通过以下方式联系：</p>
        <div class="about-links">
            <a href="mailto:your@email.com" class="about-link">Email</a>
            <a href="https://github.com/yourusername" class="about-link" target="_blank">GitHub</a>
        </div>

    </div>

</main>

<footer class="footer">
    <div class="footer-inner">
        <span class="footer-copy">&copy; 2026 我的博客</span>
        <div class="footer-links">
            <a href="about.html">关于</a>
        </div>
    </div>
</footer>

<script>
const cursorGlow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', (e) => {
    cursorGlow.style.left = e.clientX + 'px';
    cursorGlow.style.top = e.clientY + 'px';
});

document.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto:')) return;
    link.addEventListener('click', (e) => {
        e.preventDefault();
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:#d4a853;z-index:999;transform:scaleY(0);transform-origin:bottom;';
        document.body.appendChild(overlay);
        requestAnimationFrame(() => {
            overlay.style.transition = 'transform 0.5s cubic-bezier(0.65,0,0.35,1)';
            overlay.style.transform = 'scaleY(1)';
        });
        setTimeout(() => { window.location.href = href; }, 500);
    });
});

window.addEventListener('pageshow', () => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#d4a853;z-index:999;transform:scaleY(1);transform-origin:top;';
    document.body.appendChild(overlay);
    requestAnimationFrame(() => {
        overlay.style.transition = 'transform 0.6s cubic-bezier(0.65,0,0.35,1)';
        overlay.style.transform = 'scaleY(0)';
    });
    setTimeout(() => overlay.remove(), 700);
});
</script>

</body>
</html>
